[build]
command = "npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "18"

[[headers]]
for = "/sitemap.xml"
[headers.values]
Content-Type = "application/xml"
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/robots.txt"
[headers.values]
Content-Type = "text/plain"

[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"

# Canonical redirects — duplicate VA pages to canonical URLs
[[redirects]]
from = "/va-loan-killeen-tx"
to = "/killeen-va-loan"
status = 301
force = true

[[redirects]]
from = "/va-loans-killeen"
to = "/killeen-va-loan"
status = 301
force = true

[[redirects]]
from = "/fort-hood-va-loan"
to = "/va-loan-fort-hood-tx"
status = 301
force = true

# SPA fallback - serve index.html for all routes
[[redirects]]
from = "/*"
to = "/index.html"
status = 200
