<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;0,700;1,600&family=Outfit:wght@300;400;500;600;700&family=Fira+Mono:wght@400;500&display=swap" />
    <!-- Page-specific title, meta, canonical, and OG tags injected per route by react-helmet-async -->
    <title>Keys by Shalanda | Texas Mortgage Broker</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "MortgageBroker",
        "name": "Keys by Shalanda",
        "url": "https://unfilteredkeys-site.lovable.app",
        "areaServed": "TX",
        "address": { "@type": "PostalAddress", "addressRegion": "TX", "addressCountry": "US" },
        "founder": {
          "@type": "Person",
          "name": "Shalanda Smith",
          "jobTitle": "Licensed Mortgage Broker",
          "identifier": "NMLS #554554"
        },
        "parentOrganization": {
          "@type": "Organization",
          "name": "Secure Choice Lending",
          "identifier": "NMLS #1689518"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Netlify Forms detection -->
    <form name="partner-intake" data-netlify="true" hidden>
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="text" name="brokerage" />
      <input type="text" name="licenseNumber" />
      <input type="tel" name="phone" />
      <input type="email" name="email" />
      <input type="text" name="website" />
      <input type="text" name="instagram" />
      <input type="text" name="facebook" />
      <input type="text" name="linkedin" />
      <input type="text" name="mlsAssociations" />
      <input type="text" name="specialties" />
      <input type="text" name="languages" />
      <input type="text" name="languagesOther" />
      <input type="file" name="headshot" />
      <textarea name="bio"></textarea>
      <input type="text" name="companyName" />
      <input type="text" name="builderType" />
      <textarea name="communities"></textarea>
      <input type="text" name="priceRange" />
      <input type="text" name="preferredLender" />
      <input type="text" name="preferredLenderName" />
      <textarea name="lenderSwitch"></textarea>
      <input type="text" name="partnerType" />
      <input type="text" name="partnerStatus" />
      <input type="text" name="considerNewLender" />
      <input type="text" name="builderNames" />
    </form>
  </body>
</html>
